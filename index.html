<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Porte di Cusumano Giuseppe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .social-icon-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .social-link:hover .social-icon-img {
            transform: scale(1.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .text-gradient { background: linear-gradient(to right, #2563eb, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Caricamento...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // CONFIGURAZIONE DEL TEMPLATE
        // ==========================================
        const CONFIG = {
            // Dati Generali
            nomeConcessionaria: "5 PORTE",
            ragioneSociale: "\"5 PORTE\" DI CUSUMANO GIUSEPPE",
            citta: "Caltagirone",
            provinciaBreve: "CT",
            provinciaEstesa: "Provincia di Catania",
            cap: "95041",
            
            // Testi Homepage
            sottotitoloHero: "Auto, Camper e Moto. Una passione di famiglia al tuo servizio.",
            descrizioneFooter: "Nata quasi per gioco e guidata dalla passione. Oggi un punto di riferimento per chi cerca auto, camper e moto accuratamente selezionate.",
            
            // Contatti
            indirizzo: "Viale Principe Umberto, 80",
            telefonoMostrato: "+39 338 488 6567",
            telefonoLink: "+393384886567",
            whatsappNumber: "393384886567",
            email: "motors66caltagirone@gmail.com",
            
            // Social e Link Esterni
            social: {
                facebook: "https://www.facebook.com/people/5-Porte/100045235488953/",
                tiktok: "https://www.tiktok.com/@5porte?_r=1&_t=ZN-96T73OQKHIs",
                subito: "https://share.google/T7YeNRR11ZBTgdbp4"
            },
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true",
            
            // Sezione "Chi Siamo"
            chiSiamo: {
                titoloOrigini: "Dagli infissi alla passione per i motori",
                paragrafo1: "La nostra storia inizia in modo singolare: essendo da sempre abituati alla vendita nel settore degli infissi (da cui prende ispirazione il nome \"5 Porte\"), avevamo deciso inizialmente di acquistare 5 vetture quasi per gioco, solo per testare il mercato automotive e vendere qualcosina.",
                paragrafo2: "La vera svolta è avvenuta quando mio figlio è cresciuto. Vedendolo profondamente appassionato a questo mondo, abbiamo scelto di trasformare quello che era nato come un esperimento nel nostro lavoro primario. Oggi la nostra azienda è una solida realtà familiare che tratta un parco veicoli ben fornito, composto non solo da Auto, ma anche da Camper e Moto.",
                citazione: "Ho visto mio figlio appassionato e ho deciso di farlo diventare il nostro lavoro. Da un test di 5 auto a una vera e propria concessionaria.",
                nomeFondatore: "Giuseppe Cusumano",
                ruoloFondatore: "Titolare e Fondatore",
                inizialeFondatore: "G"
            },

            // Database Firebase
            firebase: {
                apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
                authDomain: "maxcar-7416d.firebaseapp.com",
                projectId: "maxcar-7416d",
                storageBucket: "maxcar-7416d.firebasestorage.app",
                messagingSenderId: "279232212865",
                appId: "1:279232212865:web:97da538c75dfd39ebb4280",
                measurementId: "G-64W5EP9H2S"
            },
            dbAppId: "5-porte-caltagirone" 
        };
        // ==========================================

        if (!firebase.apps.length) {
            firebase.initializeApp(CONFIG.firebase);
            firebase.analytics();
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const COLLECTION_PATH = `artifacts/${CONFIG.dbAppId}/public/data/automobili`;

        const LOGO_PRINCIPALE = "Logo.jpeg";
        const FB_ICON = "https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg";

        // SVG string for TikTok and Subito
        const TIKTOK_SVG = (
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z" />
            </svg>
        );
        const SUBITO_SVG = (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                <path d="M3 6h18" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedCar, setSelectedCar] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeImage, setActiveImage] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [currentHeroIndex, setCurrentHeroIndex] = useState(0);
            
            const [showMobileFilters, setShowMobileFilters] = useState(false);
            const [filters, setFilters] = useState({
                searchQuery: '',
                tipoVeicolo: 'Tutti', // Nuovo filtro richiesto (Auto, Camper, Moto)
                marca: '',
                categoria: 'Tutte',
                prezzoMax: '',
                annoMin: '',
                kmMax: '',
                alimentazione: '',
                cambio: ''
            });

            // Immagini per lo slider della Hero Section
            const heroImages = useMemo(() => [
                'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920', // Auto
                'https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?auto=format&fit=crop&q=80&w=1920', // Camper
                'https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&q=80&w=1920'  // Moto
            ], []);

            const handleFilterChange = (e) => {
                const { name, value } = e.target;
                setFilters(prev => ({ ...prev, [name]: value }));
            };

            const resetFilters = () => {
                setFilters({ searchQuery: '', tipoVeicolo: 'Tutti', marca: '', categoria: 'Tutte', prezzoMax: '', annoMin: '', kmMax: '', alimentazione: '', cambio: '' });
            };

            // Dati derivati per le opzioni dei filtri
            const marcheDisponibili = useMemo(() => [...new Set(autoList.map(a => a.marca))].sort(), [autoList]);
            const alimentazioniDisponibili = useMemo(() => [...new Set(autoList.map(a => a.alimentazione))].sort(), [autoList]);
            const cambiDisponibili = useMemo(() => [...new Set(autoList.map(a => a.cambio || 'Manuale'))].sort(), [autoList]);

            // Filtraggio
            const autoFiltrate = useMemo(() => {
                return autoList.filter(car => {
                    // Mappiamo il tipo veicolo. Se non specificato assumiamo sia un'Auto.
                    const vehicleType = car.tipoVeicolo || 'Auto';
                    
                    const matchTipo = filters.tipoVeicolo === 'Tutti' || vehicleType === filters.tipoVeicolo;
                    const matchSearch = !filters.searchQuery || `${car.marca} ${car.modello} ${car.descrizione || ''}`.toLowerCase().includes(filters.searchQuery.toLowerCase());
                    const matchMarca = !filters.marca || car.marca === filters.marca;
                    const matchCategoria = filters.categoria === 'Tutte' || car.categoria === filters.categoria;
                    const matchPrezzo = !filters.prezzoMax || Number(car.prezzo) <= Number(filters.prezzoMax);
                    const matchAnno = !filters.annoMin || Number(car.anno) >= Number(filters.annoMin);
                    const matchKm = !filters.kmMax || Number(car.km) <= Number(filters.kmMax);
                    const matchAlimentazione = !filters.alimentazione || car.alimentazione === filters.alimentazione;
                    const matchCambio = !filters.cambio || (car.cambio || 'Manuale') === filters.cambio;
                    
                    return matchTipo && matchSearch && matchMarca && matchCategoria && matchPrezzo && matchAnno && matchKm && matchAlimentazione && matchCambio;
                });
            }, [autoList, filters]);

            const homeAutoFiltrate = useMemo(() => {
                return autoList.slice(0, 6);
            }, [autoList]);

            useEffect(() => {
                document.title = `${CONFIG.nomeConcessionaria} | ${CONFIG.citta}`;
            }, []);

            // Gestione slider della hero section
            useEffect(() => {
                if (currentPage !== 'home') return;
                const interval = setInterval(() => {
                    setCurrentHeroIndex(prev => (prev + 1) % heroImages.length);
                }, 3000);
                return () => clearInterval(interval);
            }, [currentPage, heroImages.length]);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(snapshot => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                setAutoList(data);
                                setLoading(false);
                                const loader = document.getElementById('loader');
                                if (loader) loader.style.opacity = '0';
                                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
                            }, (err) => {
                                console.error("Errore database:", err);
                                setLoading(false);
                            });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Errore Auth:", error);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentPage, autoList, filters, selectedCar, isMobileMenuOpen, showMobileFilters]);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage, selectedCar]);

            const openCarDetails = (car) => {
                setSelectedCar(car);
                setActiveImage(car.immagine);
                setCurrentPage('prodotto');
            };

            const carImages = useMemo(() => {
                if (!selectedCar) return [];
                const images = [selectedCar.immagine];
                if (selectedCar.galleria && Array.isArray(selectedCar.galleria)) {
                    selectedCar.galleria.forEach(img => {
                        if (img !== selectedCar.immagine) images.push(img);
                    });
                }
                return images;
            }, [selectedCar]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 overflow-x-hidden w-full">
                    {/* Header Fisso */}
                    <header className="sticky top-0 z-50 w-full flex flex-col shadow-lg">
                        <nav className="bg-white/95 backdrop-blur-md px-6 py-3 w-full border-b border-slate-200">
                            <div className="max-w-[90rem] mx-auto flex justify-between items-center gap-4">
                                
                                {/* Logo (Sinistra) */}
                                <div className="flex items-center gap-6 lg:gap-8 flex-shrink-0">
                                    <div className="flex items-center cursor-pointer" onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }}>
                                        <img src={LOGO_PRINCIPALE} alt={CONFIG.nomeConcessionaria} className="h-16 md:h-20 object-contain" />
                                    </div>
                                </div>
                                
                                {/* Desktop Menu (Destra) */}
                                <div className="hidden lg:flex flex-wrap justify-end gap-x-8 gap-y-2 text-[10px] xl:text-xs font-bold uppercase tracking-widest items-center">
                                    <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); }} className={`transition ${currentPage === 'home' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-500 hover:text-blue-600'}`}>Home</button>
                                    <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); }} className={`transition ${currentPage === 'piazzale' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-500 hover:text-blue-600'}`}>Piazzale</button>
                                    <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); }} className={`transition ${currentPage === 'vendi' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-500 hover:text-blue-600'}`}>Vendi Auto</button>
                                    <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); }} className={`transition ${currentPage === 'chisiamo' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-500 hover:text-blue-600'}`}>Chi Siamo</button>
                                    <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); }} className={`transition ${currentPage === 'contatti' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-500 hover:text-blue-600'}`}>Contatti</button>
                                </div>

                                {/* Mobile Menu Button */}
                                <button className="lg:hidden text-slate-900 focus:outline-none p-2 flex-shrink-0" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                    <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className="w-7 h-7"></i>
                                </button>
                            </div>

                            {/* Mobile Dropdown */}
                            {isMobileMenuOpen && (
                                <div className="lg:hidden absolute top-full left-0 w-full bg-white border-b border-slate-200 shadow-2xl flex flex-col py-6 px-8 gap-6 text-sm font-bold uppercase tracking-widest text-slate-500 animate-in slide-in-from-top-2 duration-300">
                                    <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-blue-600 transition ${currentPage === 'home' ? 'text-blue-600' : ''}`}>Home</button>
                                    <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-blue-600 transition ${currentPage === 'piazzale' ? 'text-blue-600' : ''}`}>Piazzale</button>
                                    <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-blue-600 transition ${currentPage === 'vendi' ? 'text-blue-600' : ''}`}>Vendi Auto</button>
                                    <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-blue-600 transition ${currentPage === 'chisiamo' ? 'text-blue-600' : ''}`}>Chi Siamo</button>
                                    <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-blue-600 transition ${currentPage === 'contatti' ? 'text-blue-600' : ''}`}>Contatti</button>
                                </div>
                            )}
                        </nav>
                    </header>

                    <main className="flex-grow w-full">
                        {currentPage === 'home' && (
                            <>
                                <div className="relative min-h-[80vh] flex items-center justify-center text-center text-white px-4 border-b-[6px] border-blue-500 overflow-hidden bg-slate-900">
                                    
                                    {/* Sfondo Slider Dinamico */}
                                    {heroImages.map((img, index) => (
                                        <div
                                            key={img}
                                            className={`absolute inset-0 w-full h-full bg-cover bg-center transition-opacity duration-1000 ease-in-out ${index === currentHeroIndex ? 'opacity-100 z-0' : 'opacity-0 -z-10'}`}
                                            style={{
                                                backgroundImage: `linear-gradient(to bottom, rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.9)), url(${img})`
                                            }}
                                        ></div>
                                    ))}

                                    {/* Contenuto Hero */}
                                    <div className="relative z-10 max-w-4xl animate-in fade-in slide-in-from-bottom-10 duration-1000">
                                        <img src={LOGO_PRINCIPALE} alt="5 Porte" className="mx-auto h-32 md:h-48 mb-6 object-contain drop-shadow-2xl" />
                                        <p className="text-xl md:text-3xl font-bold mb-10 text-white drop-shadow-lg leading-relaxed">{CONFIG.sottotitoloHero}</p>
                                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                                            <button onClick={() => setCurrentPage('piazzale')} className="bg-gradient-to-r from-blue-600 to-cyan-500 text-white hover:from-blue-500 hover:to-cyan-400 px-12 py-5 rounded-xl font-black uppercase transition shadow-xl shadow-blue-500/50 hover:scale-105 transform border border-blue-400/50">Esplora il Piazzale</button>
                                            <a href={`tel:${CONFIG.telefonoLink}`} className="bg-white/10 hover:bg-white/30 backdrop-blur-md px-12 py-5 rounded-xl font-bold uppercase transition border border-white/30 shadow-xl">Chiama Ora</a>
                                        </div>
                                    </div>

                                    {/* Indicatori Slider */}
                                    <div className="absolute bottom-8 left-0 right-0 flex justify-center gap-3 z-10">
                                        {heroImages.map((_, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => setCurrentHeroIndex(idx)}
                                                className={`w-3 h-3 rounded-full transition-all duration-300 ${idx === currentHeroIndex ? 'bg-cyan-400 w-8' : 'bg-white/40 hover:bg-white/70'}`}
                                                aria-label={`Vai all'immagine ${idx + 1}`}
                                            ></button>
                                        ))}
                                    </div>
                                </div>
                                <div className="py-20 px-6 bg-white border-y">
                                    <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12">
                                        <div className="flex flex-col items-center text-center group">
                                            <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-[2rem] flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20 group-hover:-translate-y-2 transition-transform duration-300"><i data-lucide="car-front" className="w-10 h-10"></i></div>
                                            <h3 className="font-black uppercase text-xl mb-3">Auto, Camper e Moto</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Una vasta selezione di veicoli per ogni esigenza. Dai camper per i tuoi viaggi alle moto per le tue passioni.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center group">
                                            <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-[2rem] flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20 group-hover:-translate-y-2 transition-transform duration-300"><i data-lucide="shield-check" className="w-10 h-10"></i></div>
                                            <h3 className="font-black uppercase text-xl mb-3">Trasparenza e Affidabilità</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Nata dalla passione familiare, offriamo ai nostri clienti la massima onestà e controlli rigorosi su ogni mezzo.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center group">
                                            <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-[2rem] flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20 group-hover:-translate-y-2 transition-transform duration-300"><i data-lucide="map-pin" className="w-10 h-10"></i></div>
                                            <h3 className="font-black uppercase text-xl mb-3">Siamo a Caltagirone</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Vieni a trovarci nel nostro salone in Viale Principe Umberto 80 per scoprire e provare tutti i nostri veicoli.</p>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                        
                        {currentPage === 'home' && (
                            <div className="py-16 px-6 max-w-[90rem] mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b pb-8">
                                    <h2 className="text-4xl font-black uppercase tracking-tight flex-shrink-0">In <span className="underline decoration-blue-500">Vetrina</span></h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mb-12">
                                    {homeAutoFiltrate.map(car => (
                                        <div key={car.id} onClick={() => openCarDetails(car)} className="bg-white rounded-[2rem] overflow-hidden shadow-xl hover:shadow-2xl hover:shadow-blue-500/10 transition duration-500 border border-slate-100 group cursor-pointer">
                                            <div className="h-64 overflow-hidden relative">
                                                <img src={car.immagine} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt={car.modello} />
                                                <div className="absolute top-4 left-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white backdrop-blur px-3 py-1 rounded-full text-[10px] font-black shadow-lg shadow-blue-500/30 uppercase tracking-widest">{car.tipoVeicolo || 'Auto'} • {car.categoria}</div>
                                                <div className="absolute bottom-4 right-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-5 py-2 rounded-2xl font-black text-xl shadow-xl shadow-blue-500/40 border border-white/20">€{Number(car.prezzo)?.toLocaleString()}</div>
                                            </div>
                                            <div className="p-8">
                                                <h3 className="font-black uppercase text-2xl mb-1 tracking-tighter text-slate-900 leading-none">{car.marca}</h3>
                                                <p className="text-slate-500 font-bold uppercase text-sm mb-4">{car.modello}</p>
                                                <div className="flex items-center justify-between text-slate-400 text-[10px] font-bold uppercase border-t pt-4">
                                                    <span className="flex items-center gap-1"><i data-lucide="calendar" className="w-3 h-3 text-blue-500"></i> {car.anno}</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="gauge" className="w-3 h-3 text-cyan-500"></i> {Number(car.km)?.toLocaleString()} KM</span>

                                <div className="bg-white p-4 md:p-8 rounded-[3rem] shadow-2xl shadow-blue-500/10 border border-slate-100 flex justify-center w-full h-[900px]">
                                    <iframe 
                                        src={CONFIG.linkGoogleFormValutazione} 
                                        width="100%" 
                                        height="100%" 
                                        frameBorder="0" 
                                        marginHeight="0" 
                                        marginWidth="0"
                                        className="rounded-2xl"
                                    >Caricamento in corso…</iframe>
                                </div>
                            </div>
                        )}

                        {currentPage === 'chisiamo' && (
                            <div className="py-24 px-6 max-w-7xl mx-auto animate-in fade-in duration-700">
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl md:text-6xl font-black uppercase tracking-tighter text-slate-900 mb-6">Chi <span className="underline decoration-blue-500">Siamo</span></h2>
                                    <p className="text-xl text-slate-500 font-bold max-w-3xl mx-auto">La passione per i motori al tuo servizio. Scopri la storia di <span className="text-blue-600">{CONFIG.nomeConcessionaria}</span>.</p>
                                </div>

                                <div className="grid lg:grid-cols-2 gap-16 items-center mb-24">
                                    <div className="space-y-6">
                                        <h3 className="text-3xl font-black uppercase text-gradient">{CONFIG.chiSiamo.titoloOrigini}</h3>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo1}}></p>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo2}}></p>
                                    </div>
                                    <div className="bg-gradient-to-br from-blue-700 to-cyan-500 rounded-[3rem] p-8 md:p-12 shadow-2xl shadow-blue-500/40 text-white relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="quote" className="w-24 h-24 text-white"></i></div>
                                        <div className="relative z-10">
                                            <i data-lucide="car" className="w-12 h-12 text-cyan-200 mb-6"></i>
                                            <p className="text-xl md:text-2xl font-light italic leading-relaxed mb-8">
                                                "{CONFIG.chiSiamo.citazione}"
                                            </p>
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-white text-blue-600 rounded-full flex items-center justify-center font-black text-xl shadow-lg">{CONFIG.chiSiamo.inizialeFondatore}</div>
                                                <div>
                                                    <p className="font-bold uppercase tracking-widest text-xs">{CONFIG.chiSiamo.nomeFondatore}</p>
                                                    <p className="text-cyan-200 text-[10px] uppercase tracking-widest">{CONFIG.chiSiamo.ruoloFondatore}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-lg shadow-blue-500/5 border border-slate-100 hover:shadow-xl hover:shadow-blue-500/10 hover:-translate-y-1 transition duration-300">
                                        <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-md shadow-blue-500/20"><i data-lucide="car-front" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase mb-3">Parco Veicoli Completo</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Disponiamo stabilmente di decine di auto, oltre a camper pronti per le tue vacanze e moto per gli appassionati delle due ruote.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-lg shadow-blue-500/5 border border-slate-100 hover:shadow-xl hover:shadow-blue-500/10 hover:-translate-y-1 transition duration-300">
                                        <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-md shadow-blue-500/20"><i data-lucide="handshake" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase mb-3">Impronta Familiare</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Gestiamo tutto con passione e onestà, proprio come in famiglia. Crediamo nella trasparenza come miglior biglietto da visita.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-lg shadow-blue-500/5 border border-slate-100 hover:shadow-xl hover:shadow-blue-500/10 hover:-translate-y-1 transition duration-300">
                                        <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-cyan-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-md shadow-blue-500/20"><i data-lucide="shield-alert" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase mb-3">Sicurezza Garantita</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Ogni mezzo che esce dal nostro piazzale viene verificato e controllato, per farti guidare senza pensieri sin dal primo chilometro.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-900 text-white py-16 px-6 mt-auto border-t-[6px] border-blue-500">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12 mb-8">
                            <div>
                                <img src={LOGO_PRINCIPALE} alt="5 Porte" className="h-16 mb-6 object-contain" />
                                <p className="text-slate-400 text-sm leading-relaxed mb-6">{CONFIG.descrizioneFooter}</p>
                                <div className="flex gap-4">
                                    {CONFIG.social.facebook && (
                                        <a href={CONFIG.social.facebook} target="_blank" className="social-link w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-blue-600">
                                            <img src={FB_ICON} className="social-icon-img" alt="Facebook" />
                                        </a>
                                    )}
                                    {CONFIG.social.tiktok && (
                                        <a href={CONFIG.social.tiktok} target="_blank" className="social-link w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-slate-800 text-white">
                                            {TIKTOK_SVG}
                                        </a>
                                    )}
                                    {CONFIG.social.subito && (
                                        <a href={CONFIG.social.subito} target="_blank" className="social-link w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-red-600 text-white">
                                            {SUBITO_SVG}
                                        </a>
                                    )}
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h5 className="font-bold uppercase text-xs tracking-widest text-slate-500">Contatti Rapidi</h5>
                                <div className="flex flex-col gap-3">
                                    <a href={`tel:${CONFIG.telefonoLink}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-3">
                                        <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="phone" className="w-4 h-4"></i></div> 
                                        {CONFIG.telefonoMostrato}
                                    </a>
                                    <a href={`mailto:${CONFIG.email}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-3 break-all">
                                        <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="mail" className="w-4 h-4"></i></div> 
                                        {CONFIG.email}
                                    </a>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h5 className="font-bold uppercase text-xs tracking-widest text-slate-500">Sede Operativa</h5>
                                <p className="text-slate-300 font-bold flex items-start gap-3">
                                    <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="map-pin" className="w-4 h-4"></i></div>
                                    <span>{CONFIG.indirizzo}<br/><span className="text-slate-500 font-medium">{CONFIG.cap} {CONFIG.citta} ({CONFIG.provinciaBreve})</span></span>
                                </p>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] font-bold uppercase tracking-widest opacity-40">
                            <span>&copy; {new Date().getFullYear()} {CONFIG.ragioneSociale}</span>
                            <span>{CONFIG.citta} ({CONFIG.provinciaBreve})</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
